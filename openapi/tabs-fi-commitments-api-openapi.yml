openapi: 3.1.0
info:
  title: Tabs Platform BillingTerms Commitments API
  description: 'REST API for the Tabs revenue automation platform: customers, contracts, items, revenue categories, obligations, billing terms, invoices, payments, credit memos, usage events, and reports. Source: https://docs.tabsplatform.com/llms.txt'
  version: '3'
  contact:
    name: Tabs
    url: https://docs.tabsplatform.com/
servers:
- url: https://api.tabsplatform.com
  description: Production (assumed; consult Tabs docs for exact base URL)
security:
- ApiKeyAuth: []
tags:
- name: Commitments
paths:
  /commitments:
    get:
      tags:
      - Commitments
      summary: List commitments
      operationId: listCommitments
      responses:
        '200':
          description: OK
    post:
      tags:
      - Commitments
      summary: Create commitments
      operationId: createCommitments
      responses:
        '201':
          description: Created
  /commitments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    patch:
      tags:
      - Commitments
      summary: Update commitment
      operationId: updateCommitment
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Server-side API key issued from the Tabs dashboard for backend integrations.
