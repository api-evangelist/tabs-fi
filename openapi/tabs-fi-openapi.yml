      operationId: createInvoicePayment
      responses:
        "201":
          description: Created
  /customers/{customerId}/invoices/{invoiceId}/payments/{paymentId}:
    parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
      - name: invoiceId
        in: path
        required: true
