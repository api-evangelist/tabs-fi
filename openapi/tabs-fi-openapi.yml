          type: string
    patch:
      tags: [Customers]
      summary: Update customer name
      operationId: updateCustomerName
      responses:
        "200":
          description: OK
  /customers/{id}/contacts:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Customers]
      summary: List contacts
      operationId: listCustomerContacts
      responses:
        "200":
          description: OK
    post:
      tags: [Customers]
      summary: Create contacts
      operationId: createCustomerContacts
      responses:
        "201":
          description: Created
  /customers/{id}/contacts/{contactId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: contactId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Customers]
      summary: Update contact
      operationId: updateCustomerContact
