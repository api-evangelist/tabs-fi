openapi: 3.1.0
info:
  title: Tabs Platform API
  description: >-
    REST API for the Tabs revenue automation platform: customers, contracts,
    items, revenue categories, obligations, billing terms, invoices, payments,
    credit memos, usage events, and reports. Source:
    https://docs.tabsplatform.com/llms.txt
  version: "3"
  contact:
    name: Tabs
    url: https://docs.tabsplatform.com/
servers:
  - url: https://api.tabsplatform.com
    description: Production (assumed; consult Tabs docs for exact base URL)
security:
  - ApiKeyAuth: []
tags:
  - name: BillingTerms
  - name: Categories
  - name: Commitments
  - name: Contracts
  - name: Obligations
  - name: PerformanceObligations
  - name: CreditMemos
  - name: CustomFields
  - name: Customers
  - name: Invoices
  - name: Payments
  - name: Items
  - name: Events
  - name: EventTypes
  - name: UsageEvents
  - name: Jobs
  - name: Merchant
  - name: Renewals
  - name: Revenue
  - name: Reports
  - name: System
paths:
  /billing-terms:
    get:
      tags: [BillingTerms]
      summary: List billing terms
      operationId: listBillingTerms
      responses:
        "200":
          description: OK
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      operationId: listCategories
      responses:
        "200":
          description: OK
    post:
      tags: [Categories]
      summary: Create category
      operationId: createCategory
      responses:
        "201":
          description: Created
  /categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Categories]
      summary: Get category by ID
      operationId: getCategory
      responses:
        "200":
          description: OK
    delete:
      tags: [Categories]
      summary: Delete category
      operationId: deleteCategory
      responses:
        "204":
          description: Deleted
  /classes:
    get:
      tags: [Categories]
      summary: List classes
      operationId: listClasses
      responses:
        "200":
          description: OK
  /commitments:
    get:
      tags: [Commitments]
      summary: List commitments
      operationId: listCommitments
      responses:
        "200":
          description: OK
    post:
      tags: [Commitments]
      summary: Create commitments
      operationId: createCommitments
      responses:
        "201":
          description: Created
  /commitments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Commitments]
      summary: Update commitment
      operationId: updateCommitment
      responses:
        "200":
          description: OK
  /contracts:
    get:
      tags: [Contracts]
      summary: List contracts
      operationId: listContracts
      responses:
        "200":
          description: OK
    post:
      tags: [Contracts]
      summary: Create contract
      operationId: createContract
      responses:
        "201":
          description: Created
  /contracts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Contracts]
      summary: Get contract by ID
      operationId: getContract
      responses:
        "200":
          description: OK
    patch:
      tags: [Contracts]
      summary: Update contract
      operationId: updateContract
      responses:
        "200":
          description: OK
  /contracts/{id}/actions:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Contracts]
      summary: Perform contract action
      operationId: contractAction
      responses:
        "200":
          description: OK
  /contracts/{id}/file:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Contracts]
      summary: Download contract file
      operationId: downloadContractFile
      responses:
        "200":
          description: OK
    post:
      tags: [Contracts]
      summary: Upload contract file
      operationId: uploadContractFile
      responses:
        "201":
          description: Created
  /contracts/{id}/obligations:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Obligations]
      summary: Create contract obligation
      operationId: createContractObligation
      responses:
        "201":
          description: Created
  /contracts/{id}/obligations/{obligationId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: obligationId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Obligations]
      summary: Get obligation by ID
      operationId: getContractObligation
      responses:
        "200":
          description: OK
    patch:
      tags: [Obligations]
      summary: Update obligation
      operationId: updateContractObligation
      responses:
        "200":
          description: OK
    delete:
      tags: [Obligations]
      summary: Delete obligation
      operationId: deleteContractObligation
      responses:
        "204":
          description: Deleted
  /obligations:
    get:
      tags: [Obligations]
      summary: List obligations
      operationId: listObligations
      responses:
        "200":
          description: OK
  /obligations/custom-revenue:
    post:
      tags: [Obligations]
      summary: Upsert custom revenue
      operationId: upsertCustomRevenue
      responses:
        "200":
          description: OK
  /contracts/{id}/billing-terms:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [BillingTerms]
      summary: List contract billing terms
      operationId: listContractBillingTerms
      responses:
        "200":
          description: OK
    post:
      tags: [BillingTerms]
      summary: Create contract billing term
      operationId: createContractBillingTerm
      responses:
        "201":
          description: Created
  /contracts/{id}/billing-terms/{termId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: termId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [BillingTerms]
      summary: Update billing term
      operationId: updateContractBillingTerm
      responses:
        "200":
          description: OK
    delete:
      tags: [BillingTerms]
      summary: Delete billing term
      operationId: deleteContractBillingTerm
      responses:
        "204":
          description: Deleted
  /contracts/{id}/performance-obligations:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [PerformanceObligations]
      summary: List performance obligations
      operationId: listContractPerformanceObligations
      responses:
        "200":
          description: OK
  /contracts/{id}/performance-obligations/batch:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [PerformanceObligations]
      summary: Bulk save performance obligations
      operationId: bulkSavePerformanceObligations
      responses:
        "200":
          description: OK
  /performance-obligations:
    get:
      tags: [PerformanceObligations]
      summary: List performance obligations
      operationId: listPerformanceObligations
      responses:
        "200":
          description: OK
  /performance-obligations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [PerformanceObligations]
      summary: Update performance obligation
      operationId: updatePerformanceObligation
      responses:
        "200":
          description: OK
  /credit-memos:
    get:
      tags: [CreditMemos]
      summary: List credit memos
      operationId: listCreditMemos
      responses:
        "200":
          description: OK
    post:
      tags: [CreditMemos]
      summary: Create credit memo
      operationId: createCreditMemo
      responses:
        "201":
          description: Created
  /credit-memos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [CreditMemos]
      summary: Get credit memo by ID
      operationId: getCreditMemo
      responses:
        "200":
          description: OK
  /credit-memos/{id}/apply:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [CreditMemos]
      summary: Apply credit memo
      operationId: applyCreditMemo
      responses:
        "200":
          description: OK
  /custom-fields:
    get:
      tags: [CustomFields]
      summary: List custom fields
      operationId: listCustomFields
      responses:
        "200":
          description: OK
  /customers:
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      responses:
        "200":
          description: OK
    post:
      tags: [Customers]
      summary: Create customer
      operationId: createCustomer
      responses:
        "201":
          description: Created
  /customers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Customers]
      summary: Get customer by ID
      operationId: getCustomer
      responses:
        "200":
          description: OK
    delete:
      tags: [Customers]
      summary: Delete customer
      operationId: deleteCustomer
      responses:
        "204":
          description: Deleted
  /customers/{id}/name:
    parameters:
      - name: id
        in: path
        required: true
