        "201":
          description: Created
  /usage-events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [UsageEvents]
      summary: Delete usage event
      operationId: deleteUsageEvent
      responses:
        "204":
          description: Deleted
  /jobs/{id}:
    parameters:
      - name: id
        in: path
        required: true
