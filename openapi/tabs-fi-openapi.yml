      operationId: listRevenue
      responses:
        "200":
          description: OK
  /reports/arr:
    get:
      tags: [Reports]
      summary: Get ARR report
      operationId: getArrReport
      responses:
        "200":
          description: OK
  /reports/cash-forecasting:
    get:
      tags: [Reports]
      summary: Get cash forecasting report
      operationId: getCashForecastingReport
      responses:
        "200":
          description: OK
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: health
      responses:
        "200":
          description: OK
  /health/live:
    get:
      tags: [System]
      summary: Liveness check
      operationId: healthLive
      responses:
        "200":
          description: OK
  /version:
    get:
      tags: [System]
