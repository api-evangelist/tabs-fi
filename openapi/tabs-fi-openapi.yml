        "200":
          description: OK
    post:
      tags: [EventTypes]
      summary: Create event type
      operationId: createEventType
      responses:
        "201":
          description: Created
  /event-types/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [EventTypes]
      summary: Get event type by ID
      operationId: getEventType
      responses:
        "200":
          description: OK
    delete:
